name: Build iOS Enterprise App for TrollStore

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      TEAM_ID: Q6SJUT5K5D
      BUNDLE_ID: com.xl.MyXL.Giant-staging
      EXPORT_METHOD: enterprise
      APP_NAME: MyXL

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: "ci_password"
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/MyXL-UniversalDist.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n\r ' | base64 --decode > $CERTIFICATE_PATH || echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n\r ' | base64 -D > $CERTIFICATE_PATH
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n\r ' | base64 --decode > $PP_PATH || echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n\r ' | base64 -D > $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build and archive
        run: |
          cd ios/App
          xcodebuild clean -workspace App.xcworkspace \
            -scheme App \
            -configuration Release
          
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ github.workspace }}/build/$APP_NAME.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_IDENTITY="iPhone Distribution: XL AXIATA, PT TBK"

      - name: Export .ipa
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/build/$APP_NAME.xcarchive \
            -exportPath ${{ github.workspace }}/build \
            -exportOptionsPlist ./ExportOptions.plist

      - name: Rename .ipa with version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "ios/App/App/Info.plist")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "ios/App/App/Info.plist")
          mv build/$APP_NAME.ipa build/${APP_NAME}_v${VERSION}.${BUILD}.ipa

      - name: Prepare .ipa for TrollStore
        run: |
          mkdir -p build/Payload
          cp -R build/${APP_NAME}_v${VERSION}.${BUILD}.ipa build/Payload/$APP_NAME.app
          cd build
          zip -r ${APP_NAME}_v${VERSION}.${BUILD}.ipa Payload
          cd ..

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ${APP_NAME}_Enterprise_TrollStore.ipa
          path: build/${APP_NAME}_v${VERSION}.${BUILD}.ipa