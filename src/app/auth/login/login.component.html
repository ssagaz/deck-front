        <h2 class="mt-8 text-2xl font-bold leading-9 tracking-tight text-white">
            Deck Admin
        </h2>

      <div class="mt-10">
        <div>
          <!-- Local Login Form -->
          <form class="space-y-6" action="#" method="POST">
            <div>
              <label for="email" class="block text-sm font-medium leading-6 text-white">Email ou Username</label>
              <div class="mt-2">
                <input id="email" name="email" type="email" autocomplete="email" required class="block w-full rounded-md border-0 bg-gray-800 py-1.5 text-white shadow-sm ring-1 ring-inset ring-gray-700/50 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6 px-3">
              </div>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium leading-6 text-white">Senha</label>
              <div class="mt-2">
                <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full rounded-md border-0 bg-gray-800 py-1.5 text-white shadow-sm ring-1 ring-inset ring-gray-700/50 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6 px-3">
              </div>
            </div>

            <div class="flex items-center justify-between">
              <div class="flex items-center">
                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-gray-700 bg-gray-900 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-900">
                <label for="remember-me" class="ml-3 block text-sm leading-6 text-gray-400">Lembrar de mim</label>
              </div>

              <div class="text-sm leading-6">
                <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Esqueceu sua senha?</a>
              </div>
            </div>

            <div>
              <button type="button" class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">
                Entrar
              </button>
            </div>
          </form>

          <!-- Divider -->
          <div class="mt-10">
            <div class="relative">
              <div class="absolute inset-0 flex items-center" aria-hidden="true">
                <div class="w-full border-t border-gray-700"></div>
