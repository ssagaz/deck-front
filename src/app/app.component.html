<div class="min-h-screen bg-gray-100 prose prose-sm max-w-none">
  <nav class="bg-white shadow-md not-prose">
    <div class="max-w-md mx-auto px-4">
      <div class="flex justify-between items-center h-14">
        <span class="text-xl font-bold text-gray-800">Deck Delivery</span>
        
        <button (click)="toggleMenu()" class="p-2 rounded-md hover:bg-gray-100 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (isMenuOpen) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            }
          </svg>
        </button>
      </div>

      @if (isMenuOpen) {
        <div class="pb-3">
          <a routerLink="/products" routerLinkActive="text-blue-600" (click)="isMenuOpen = false" class="block py-2 text-gray-700 hover:text-blue-600">
            Products
          </a>
        </div>
      }
    </div>
  </nav>

  <main class="max-w-md mx-auto">
    <router-outlet />
  </main>
</div>
